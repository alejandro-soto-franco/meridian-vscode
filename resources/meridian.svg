<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <g transform="translate(12 12)">
    <circle r="9.6" fill="none" stroke="currentColor" stroke-width="1"/>
    <circle r="6.6" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.5"/>
    <!-- Long cardinal points (N,E,S,W) as kite diamonds -->
    <g>
      <polygon points="0,-9.6 1.6,0 0,9.6 -1.6,0"/>
      <polygon points="-9.6,0 0,1.6 9.6,0 0,-1.6"/>
    </g>
    <!-- Short ordinal points (NE,SE,SW,NW) rotated 45deg -->
    <g transform="rotate(45)" opacity="0.7">
      <polygon points="0,-6.6 1.1,0 0,6.6 -1.1,0"/>
      <polygon points="-6.6,0 0,1.1 6.6,0 0,-1.1"/>
    </g>
    <!-- N marker dot -->
    <circle cx="0" cy="-9.6" r="0.9"/>
    <!-- Center hub -->
    <circle r="1.3"/>
  </g>
</svg>
